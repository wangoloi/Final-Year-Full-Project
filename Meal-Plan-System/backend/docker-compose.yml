version: "3.8"

# Optional infra for local development (Postgres, Redis, Elasticsearch).
# From repo root:  docker compose -f backend/docker-compose.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: glocusense-postgres
    environment:
      POSTGRES_USER: glocusense
      POSTGRES_PASSWORD: glocusense_dev
      POSTGRES_DB: glocusense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glocusense -d glocusense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glocusense-redis
    command: redis-server --requirepass redis_dev --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: glocusense-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
